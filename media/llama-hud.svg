<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79c0ff"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#56d364"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Terminal frame -->
  <rect x="48" y="48" width="416" height="416" rx="72" fill="#0d1117" stroke="#30363d" stroke-width="6"/>

  <!-- Title bar -->
  <rect x="48" y="48" width="416" height="64" rx="72" fill="#161b22"/>
  <rect x="48" y="72" width="416" height="16" fill="#161b22"/>

  <!-- Window dots -->
  <circle cx="88" cy="80" r="10" fill="#ff5f56"/>
  <circle cx="116" cy="80" r="10" fill="#ffbd2e"/>
  <circle cx="144" cy="80" r="10" fill="#27c93f"/>

  <!-- Llama.cpp logo (body + legs) -->
  <g transform="translate(256, 260) scale(1.3)">
    <!-- Body -->
    <path fill="#ff8236" d="M 0,-60 C -30,-60 -50,-40 -50,-10 C -50,20 -30,50 0,50 C 20,50 40,30 50,10 L 60,40 C 40,55 20,60 0,60 C -40,60 -70,30 -70,-10 C -70,-50 -40,-80 0,-80 C 20,-80 40,-70 50,-50 Z"/>
    <!-- Head -->
    <path fill="#ff8236" d="M -20,-70 C -40,-70 -60,-50 -60,-20 C -60,0 -40,20 -20,20 L -30,-10"/>
    <!-- Front legs -->
    <polygon fill="#ff8236" points="10,50 10,90 -5,90 -5,65 -15,65 -15,50"/>
    <polygon fill="#ff8236" points="30,45 30,85 15,85 15,70 5,70 5,55"/>
    <!-- Ear -->
    <path fill="#ff8236" d="M -30,-75 C -25,-65 -35,-55 -40,-50 C -45,-60 -40,-70 -30,-75 Z"/>
    <!-- ++ symbols -->
    <text x="25" y="0" fill="#ff8236" font-family="monospace" font-size="56" font-weight="bold">++</text>
  </g>

  <!-- Graph overlay (bottom area) -->
  <!-- Prompt curve (blue) -->
  <path d="M 80 380 Q 140 360 200 330 T 320 270 Q 370 245 432 230" fill="none" stroke="#58a6ff" stroke-width="5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M 80 380 Q 140 360 200 330 T 320 270 Q 370 245 432 230 L 432 400 L 80 400 Z" fill="url(#blue)" opacity="0.12"/>

  <!-- Gen curve (green) -->
  <path d="M 80 300 Q 140 310 200 320 T 320 350 Q 370 365 432 375" fill="none" stroke="#3fb950" stroke-width="5" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M 80 300 Q 140 310 200 320 T 320 350 Q 370 365 432 375 L 432 400 L 80 400 Z" fill="url(#green)" opacity="0.12"/>

  <!-- Baseline -->
  <line x1="80" y1="400" x2="432" y2="400" stroke="#30363d" stroke-width="2"/>
</svg>
